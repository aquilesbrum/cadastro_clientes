<!DOCTYPE html>
<!-- Define o documento como HTML5 -->

<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <!-- Permite caracteres especiais -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Responsividade -->

    <title>Cadastro de Clientes</title>

    <!-- Importa o CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>Cadastro de Clientes</h1>

        <div class="formulario">

            <!-- PRIMEIRA LINHA -->
            <div class="campo nome">
                <label>Nome</label>
                <input type="text" id="nome">
            </div>

            <!-- SEGUNDA LINHA -->
            <div class="campo cpf">
                <label>CPF</label>
                <input type="text" id="cpf">
            </div>

            <div class="campo rg">
                <label>RG</label>
                <input type="text" id="rg">
            </div>

            <div class="campo dataNascimento">
                <label>Data de Nascimento</label>
                <input type="date" id="dataNascimento">
            </div>

            <div class="campo telefone">
                <label>Telefone</label>
                <input type="text" id="telefone">
            </div>

            <div class="campo whatsapp">
                <label>Whatsapp</label>
                <input type="text" id="whatsapp">
            </div>

            <div class="campo email">
                <label>E-mail</label>
                <input type="email" id="email">
            </div>

            <!-- TERCEIRA LINHA -->
            <div class="campo logradouro">
                <label>Logradouro</label>
                <input type="text" id="logradouro">
            </div>

            <div class="campo numero">
                <label>Número</label>
                <input type="text" id="numero">
            </div>

            <div class="campo complemento">
                <label>Complemento</label>
                <input type="text" id="complemento">
            </div>

            <!-- QUARTA LINHA -->
            <div class="campo bairro">
                <label>Bairro</label>
                <input type="text" id="bairro">
            </div>

            <div class="campo cidade">
                <label>Cidade</label>
                <input type="text" id="cidade">
            </div>

            <div class="campo uf">
                <label>UF</label>
                <input type="text" id="uf">
            </div>

            <div class="campo cep">
                <label>CEP</label>
                <input type="text" id="cep">
            </div>

        </div>

        <div class="area-botao">

            <button onclick="salvar()">
                Salvar Cliente
            </button>

        </div>

        <hr>

        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Nome</th>
                    <th>Whatsapp</th>
                    <th>Bairro</th>
                    <th>Cidade</th>
                    <th>UF</th>
                    <th>Ações</th>

                </tr>

            </thead>

            <tbody id="tabela"></tbody>

        </table>

    </div>

    <script src="script.js"></script>

</body>

</html>
